<svg xmlns="http://www.w3.org/2000/svg" width="495" height="280" viewBox="0 0 495 280" role="img" aria-label="Agent Passport: Multi-Agent Operator">
<title>Agent Passport: Multi-Agent Operator</title>
<style>
.f{opacity:0;animation:fu 0.70s cubic-bezier(.4,0,.2,1) forwards}

l="#24283b"/><rect class="passport-bar" style="animation-delay:0.40s" x="38" y="147" width="83" height="4" rx="2" fill="#7aa2f7"/></g><g class="f" style="animation-delay:0.40s"><circle cx="27" cy="159" r="4" fill="#9ece6a"/><text x="38" y="163" font-size="10" font-weight="600" fill="#c0caf5">antigravity</text><text x="193" y="163" text-anchor="end" font-size="10" fill="#9aa5ce">15 sessions</text><rect x="38" y="169" width="155" height="4" rx="2" fill="#24283b"/><rect class="passport-bar" style="animation-delay:0.50s" x="38" y="169" width="26" height="4" rx="2" fill="#9ece6a"/></g><g class="f" style="animation-delay:0.50s"><circle cx="27" cy="181" r="4" fill="#e0af68"/><text x="38" y="185" font-size="10" font-weight="600" fill="#c0caf5">codex</text><text x="193" y="185" text-anchor="end" font-size="10" fill="#9aa5ce">11 sessions</text><rect x="38" y="191" width="155" height="4" rx="2" fill="#24283b"/><rect class="passport-bar" style="animation-delay:0.60s" x="38" y="191" width="19" height="4" rx="2" fill="#e0af68"/></g><g transform="translate(397 125)"><g class="passport-orbit"><circle r="67" fill="none" stroke="#70a5fd" stroke-opacity=".18" stroke-width="1" stroke-dasharray="3 7"/><circle r="49" fill="none" stroke="#bb9af7" stroke-opacity=".32" stroke-width="1.5" stroke-dasharray="2 6"/></g><circle r="37" fill="url(#passportCore)" stroke="#70a5fd" stroke-opacity=".55"/><circle class="passport-pulse" r="26" fill="none" stroke="#bb9af7" stroke-width="1.5"/><path d="M-17 5 L-5 -9 L4 7 L18 -16" fill="none" stroke="#c0caf5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="18" cy="-16" r="3.5" fill="#9ece6a"/><circle class="passport-spark" cx="-59" cy="-26" r="3" fill="#e0af68"/><circle class="passport-spark late" cx="51" cy="35" r="2.5" fill="#bb9af7"/></g><rect x="15" y="207" width="465" height="59" rx="9" fill="#16161e" fill-opacity=".66" stroke="#3b4261" stroke-opacity=".7"/><g class="f" style="animation-delay:0.40s"><text x="25" y="227" font-size="8" font-weight="700" letter-spacing="1.1" fill="#9aa5ce">SESSIONS</text><text x="25" y="250" font-size="19" font-weight="800" fill="#c0caf5">74</text></g><g class="f" style="animation-delay:0.48s"><text x="107" y="227" font-size="8" font-weight="700" letter-spacing="1.1" fill="#9aa5ce">AGENTS</text><text x="107" y="250" font-size="19" font-weight="800" fill="#c0caf5">3</text></g><g class="f" style="animation-delay:0.56s"><text x="189" y="227" font-size="8" font-weight="700" letter-spacing="1.1" fill="#9aa5ce">STREAK</text><text x="189" y="250" font-size="19" font-weight="800" fill="#c0caf5">8d</text></g><g class="f" style="animation-delay:0.64s"><text x="271" y="227" font-size="8" font-weight="700" letter-spacing="1.1" fill="#9aa5ce">MODELS</text><text x="271" y="250" font-size="19" font-weight="800" fill="#c0caf5">7</text></g><text x="454" y="246" text-anchor="end" font-size="8" font-weight="700" letter-spacing="1" fill="#9aa5ce">PRIVATE BY DESIGN</text><text x="454" y="257" text-anchor="end" font-size="8" fill="#9aa5ce">local sessions only</text></g>
</svg>
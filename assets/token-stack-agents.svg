<svg xmlns="http://www.w3.org/2000/svg" width="495" height="220" viewBox="0 0 495 220" role="img" aria-label="AI Coding Agents">
<title>AI Coding Agents</title>
<style>
.f{opacity:0;animation:fu 0.70s cubic-bezier(.4,0,.2,1) forwards}
@keyframes fu{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.bx{transform:scaleX(0);transform-box:fill-box;transform-origin:left center;animation:gx 0.90s cubic-bezier(.2,.6,.2,1) forwards}
@keyframes gx{to{transform:scaleX(1)}}
.by{transform:scaleY(0);transform-box:fill-box;transform-origin:center bottom;animation:gy 0.80s cubic-bezier(.2,.6,.2,1) forwards}
@keyframes gy{to{transform:scaleY(1)}}

@media (prefers-reduced-motion:reduce){*{animation-duration:.01s!important;animation-delay:0s!important}}
</style>
<rect x="0.5" y="0.5" width="494" height="219" rx="8" fill="#0d1117" stroke="#3d444d"/>
<g font-family="'Segoe UI',Ubuntu,Sans-Serif"><text class="f" x="25" y="33" font-size="16" font-weight="600" fill="#58a6ff">◈ AI Coding Agents</text><text class="f" style="animation-delay:0.12s" x="470" y="33" font-size="11" text-anchor="end" fill="#9ea7b3">local data · all time</text><g class="f" style="animation-delay:0.12s"><text x="25" y="62" font-size="12" fill="#e6edf3">claude-code</text><rect x="165" y="52" width="250" height="9" rx="4.5" fill="#21262d"/><rect class="bx" style="animation-delay:0.12s" x="165" y="52" width="250" height="9" rx="4.5" fill="#58a6ff"/><text x="470" y="62" font-size="11" text-anchor="end" fill="#9ea7b3">100.0% · 3.39B</text></g></g>
</svg>